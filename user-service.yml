server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://user-db:3306/userdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
